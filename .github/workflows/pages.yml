name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs only
        uses: actions/checkout@v4
        with:
          sparse-checkout: docs/
          sparse-checkout-cone-mode: false
          submodules: false

      # Keep the manifest on the site when redeploying after a docs push;
      # the build workflow refreshes it after each successful build.
      - name: Fetch latest moredeps.json
        run: |
          curl -sfL "https://github.com/${{ github.repository }}/releases/download/latest/moredeps.json" \
            -o docs/moredeps.json || echo "No moredeps.json available yet; skipping"

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
