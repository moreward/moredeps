name: Build All Platforms

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Platforms to build (all, linux, macos, windows, or comma-separated list)'
        default: 'all'
        required: true

env:
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 2G
  CMAKE_BUILD_PARALLEL_LEVEL: 2

permissions:
  contents: write
  actions: write
  id-token: write

jobs:
  # ---------------------------------------------------------------------------
  # Determine which jobs to run based on input
  # ---------------------------------------------------------------------------
  configure:
    runs-on: ubuntu-latest
    outputs:
      linux: ${{ steps.check.outputs.linux }}
      macos: ${{ steps.check.outputs.macos }}
      windows: ${{ steps.check.outputs.windows }}
    steps:
      - id: check
        run: |
          INPUT="${{ inputs.platforms }}"
          # Normalize: lowercase, replace commas with spaces
          NORMALIZED=$(echo "$INPUT" | tr '[:upper:]' '[:lower:]' | tr ',' ' ')
          
          if echo "$NORMALIZED" | grep -qE '\b(all|linux|linux_x64|linux_arm64|wasm|wasm_emscripten)\b'; then
            echo "linux=true" >> "$GITHUB_OUTPUT"
          else
            echo "linux=false" >> "$GITHUB_OUTPUT"
          fi
          if echo "$NORMALIZED" | grep -qE '\b(all|macos|macos_arm64)\b'; then
            echo "macos=true" >> "$GITHUB_OUTPUT"
          else
            echo "macos=false" >> "$GITHUB_OUTPUT"
          fi
          if echo "$NORMALIZED" | grep -qE '\b(all|windows|windows_x64|windows_arm64)\b'; then
            echo "windows=true" >> "$GITHUB_OUTPUT"
          else
            echo "windows=false" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # Linux job: builds linux_x64, linux_arm64, wasm_emscripten
  # ---------------------------------------------------------------------------
  build-linux:
    needs: configure
    if: needs.configure.outputs.linux == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build ccache \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libc6-dev-arm64-cross \
            libx11-dev libx11-xcb-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libxext-dev libxss-dev libxtst-dev \
            libxkbcommon-dev libasound2-dev libgl1-mesa-dev libvulkan-dev

      - name: Cache submodules
        uses: actions/cache@v4
        with:
          path: deps/
          key: submodules-${{ hashFiles('.gitmodules') }}-${{ hashFiles('deps/*/HEAD') }}
          restore-keys: |
            submodules-${{ hashFiles('.gitmodules') }}-

      - name: Init submodules
        run: |
          git submodule update --init --jobs 4
          # cimgui has a nested imgui submodule that we need
          cd deps/cimgui && git submodule update --init imgui

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-linux-${{ hashFiles('CMakeLists.txt', 'src/**/*.c', 'src/**/*.h', 'src/**/*.cpp') }}
          restore-keys: |
            ccache-linux-

      - name: Build linux_x64
        if: |
          contains(inputs.platforms, 'all') ||
          contains(inputs.platforms, 'linux') ||
          contains(inputs.platforms, 'linux_x64')
        run: |
          export PATH="/usr/lib/ccache:$PATH"
          ./scripts/build_all.sh linux_x64

      - name: Build linux_arm64
        if: |
          contains(inputs.platforms, 'all') ||
          contains(inputs.platforms, 'linux') ||
          contains(inputs.platforms, 'linux_arm64')
        run: |
          export PATH="/usr/lib/ccache:$PATH"
          ./scripts/build_all.sh linux_arm64

      - name: Cache Emscripten SDK
        uses: actions/cache@v4
        with:
          path: ~/emsdk
          key: emsdk-${{ runner.os }}-${{ hashFiles('toolchain/wasm_emscripten.cmake') }}
          restore-keys: |
            emsdk-${{ runner.os }}-

      - name: Install Emscripten
        if: |
          contains(inputs.platforms, 'all') ||
          contains(inputs.platforms, 'linux') ||
          contains(inputs.platforms, 'wasm') ||
          contains(inputs.platforms, 'wasm_emscripten')
        run: |
          if [ ! -d "$HOME/emsdk/emsdk" ]; then
            git clone --depth 1 https://github.com/emscripten-core/emsdk.git ~/emsdk
            ~/emsdk/emsdk install latest
            ~/emsdk/emsdk activate latest
          fi

      - name: Build wasm_emscripten
        if: |
          contains(inputs.platforms, 'all') ||
          contains(inputs.platforms, 'linux') ||
          contains(inputs.platforms, 'wasm') ||
          contains(inputs.platforms, 'wasm_emscripten')
        run: |
          source ~/emsdk/emsdk_env.sh
          export PATH="/usr/lib/ccache:$PATH"
          ./scripts/build_all.sh wasm_emscripten

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: _out/
          retention-days: 1
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # macOS job: builds macos_arm64
  # ---------------------------------------------------------------------------
  build-macos:
    needs: configure
    if: needs.configure.outputs.macos == 'true'
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install build tools
        run: |
          brew install ninja ccache

      - name: Cache submodules
        uses: actions/cache@v4
        with:
          path: deps/
          key: submodules-${{ hashFiles('.gitmodules') }}-${{ hashFiles('deps/*/HEAD') }}
          restore-keys: |
            submodules-${{ hashFiles('.gitmodules') }}-

      - name: Init submodules
        run: |
          git submodule update --init --jobs 4
          # cimgui has a nested imgui submodule that we need
          cd deps/cimgui && git submodule update --init imgui

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-macos-${{ hashFiles('CMakeLists.txt', 'src/**/*.c', 'src/**/*.h', 'src/**/*.cpp') }}
          restore-keys: |
            ccache-macos-

      - name: Build macos_arm64
        run: |
          export PATH="/opt/homebrew/opt/ccache/libexec:$PATH"
          ./scripts/build_all.sh macos_arm64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: _out/
          retention-days: 1
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Windows job: builds windows_x64, windows_arm64
  # ---------------------------------------------------------------------------
  build-windows:
    needs: configure
    if: needs.configure.outputs.windows == 'true'
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install build tools
        run: |
          choco install ninja sccache

      - name: Cache submodules
        uses: actions/cache@v4
        with:
          path: deps/
          key: submodules-${{ hashFiles('.gitmodules') }}-${{ hashFiles('deps/*/HEAD') }}
          restore-keys: |
            submodules-${{ hashFiles('.gitmodules') }}-

      - name: Init submodules
        run: |
          git submodule update --init --jobs 4
          # cimgui has a nested imgui submodule that we need
          cd deps/cimgui && git submodule update --init imgui
        shell: bash

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.sccache
          key: sccache-windows-${{ hashFiles('CMakeLists.txt', 'src/**/*.c', 'src/**/*.h', 'src/**/*.cpp') }}
          restore-keys: |
            sccache-windows-

      - name: Build windows_x64
        if: |
          contains(inputs.platforms, 'all') ||
          contains(inputs.platforms, 'windows') ||
          contains(inputs.platforms, 'windows_x64')
        run: |
          export SCCACHE_DIR="$GITHUB_WORKSPACE/.sccache"
          export PATH="/c/ProgramData/chocolatey/lib/sccache/tools:$PATH"
          ./scripts/build_all.sh windows_x64
        shell: bash

      - name: Build windows_arm64
        if: |
          contains(inputs.platforms, 'all') ||
          contains(inputs.platforms, 'windows') ||
          contains(inputs.platforms, 'windows_arm64')
        run: |
          export SCCACHE_DIR="$GITHUB_WORKSPACE/.sccache"
          export PATH="/c/ProgramData/chocolatey/lib/sccache/tools:$PATH"
          ./scripts/build_all.sh windows_arm64
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: _out/
          retention-days: 1
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Release job: packages artifacts, creates manifest, uploads to GitHub Releases
  # ---------------------------------------------------------------------------
  release:
    needs: [configure, build-linux, build-macos, build-windows]
    runs-on: ubuntu-24.04
    # Only run release if all requested builds succeeded (not failed or cancelled)
    if: |
      always() &&
      (needs.build-linux.result == 'success' || needs.build-linux.result == 'skipped') &&
      (needs.build-macos.result == 'success' || needs.build-macos.result == 'skipped') &&
      (needs.build-windows.result == 'success' || needs.build-windows.result == 'skipped')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: _out/
          merge-multiple: true

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate manifest and package zips
        run: |
          python scripts/ci_package.py \
            --out-dir _out/ \
            --repo-sha ${{ github.sha }} \
            --manifest-out build_manifest.json

      - name: Collect release files
        run: |
          mkdir -p release_assets
          cp build_manifest.json release_assets/
          find _out/ -name "moredeps-*.zip" -exec cp {} release_assets/ \;
          ls -la release_assets/

      - name: Create build release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          name: Build ${{ github.sha }}
          body: |
            Automated build for commit ${{ github.sha }}.
            Platforms: ${{ inputs.platforms }}
          files: release_assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete old latest release assets
        run: |
          # Get release ID for 'latest' tag
          RELEASE_DATA=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/latest")
          RELEASE_ID=$(echo "$RELEASE_DATA" | jq -r '.id // empty')
          if [ -n "$RELEASE_ID" ] && [ "$RELEASE_ID" != "null" ]; then
            # Delete all assets
            echo "$RELEASE_DATA" | jq -r '.assets[].id' | while read asset_id; do
              curl -s -X DELETE -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                "https://api.github.com/repos/${{ github.repository }}/releases/assets/$asset_id"
            done
            # Delete the release itself (we'll recreate it)
            curl -s -X DELETE -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID"
            # Delete the tag
            curl -s -X DELETE -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/git/refs/tags/latest"
          fi

      - name: Create latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Rolling alias for the latest successful build.
            Current: ${{ github.sha }}
          files: release_assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
