name: Build All Platforms

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Platforms to build (all, linux, macos, windows, or comma-separated list)'
        default: 'all'
        required: true
      shared:
        description: 'Also build shared libraries (.so/.dylib/.dll)'
        type: boolean
        default: true

env:
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 2G
  CMAKE_BUILD_PARALLEL_LEVEL: 2
  # Pinned Emscripten version. Do NOT use "latest": it tracks LLVM main
  # snapshots which have ICE'd on box3d (clang SIGSEGV on shape.c).
  EMSDK_VERSION: "5.0.7"

permissions:
  contents: write
  actions: write
  id-token: write

jobs:
  # ---------------------------------------------------------------------------
  # Determine which jobs to run based on input
  # ---------------------------------------------------------------------------
  configure:
    runs-on: ubuntu-latest
    outputs:
      linux_x64: ${{ steps.check.outputs.linux_x64 }}
      linux_arm64: ${{ steps.check.outputs.linux_arm64 }}
      wasm_emscripten: ${{ steps.check.outputs.wasm_emscripten }}
      macos_arm64: ${{ steps.check.outputs.macos_arm64 }}
      ios: ${{ steps.check.outputs.ios }}
      android: ${{ steps.check.outputs.android }}
      windows_x64: ${{ steps.check.outputs.windows_x64 }}
      windows_arm64: ${{ steps.check.outputs.windows_arm64 }}
    steps:
      - id: check
        run: |
          INPUT="${{ inputs.platforms }}"
          # Normalize: lowercase, replace commas with spaces
          NORMALIZED=$(echo "$INPUT" | tr '[:upper:]' '[:lower:]' | tr ',' ' ')

          set_output() {
            if echo "$NORMALIZED" | grep -qE "\b($1)\b"; then
              echo "$2=true" >> "$GITHUB_OUTPUT"
            else
              echo "$2=false" >> "$GITHUB_OUTPUT"
            fi
          }

          set_output 'all|linux|linux_x64' linux_x64
          set_output 'all|linux|linux_arm64' linux_arm64
          set_output 'all|linux|wasm|wasm_emscripten' wasm_emscripten
          set_output 'all|macos|macos_arm64' macos_arm64
          set_output 'all|ios' ios
          set_output 'all|android' android
          set_output 'all|windows|windows_x64' windows_x64
          set_output 'all|windows|windows_arm64' windows_arm64

  # ---------------------------------------------------------------------------
  # Linux x64 (native)
  # ---------------------------------------------------------------------------
  build-linux-x64:
    needs: configure
    if: needs.configure.outputs.linux_x64 == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install build tools
        run: |
          # Remove system libuv so CMake finds ours (ubuntu-24.04 has libuv1 pre-installed)
          sudo apt-get remove -y libuv1-dev libuv1t64 libuv1 2>/dev/null || true
          sudo rm -f /usr/lib/x86_64-linux-gnu/libuv.so* /usr/lib/aarch64-linux-gnu/libuv.so* 2>/dev/null || true
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build ccache \
            libx11-dev libx11-xcb-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libxext-dev libxss-dev libxtst-dev \
            libxkbcommon-dev libasound2-dev libgl1-mesa-dev libvulkan-dev

      - name: Init submodules
        run: |
          git submodule update --init --jobs 4
          # cimgui has a nested imgui submodule that we need
          cd deps/cimgui && git submodule update --init imgui
          cd deps/libdatachannel && git submodule update --init --jobs 4

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-linux_x64-${{ hashFiles('CMakeLists.txt', 'src/**/*.c', 'src/**/*.h', 'src/**/*.cpp') }}
          restore-keys: |
            ccache-linux_x64-

      - name: Build linux_x64
        run: |
          export CMAKE_C_COMPILER_LAUNCHER=ccache
          export CMAKE_CXX_COMPILER_LAUNCHER=ccache
          export MOREDEPS_TOP_LEVEL_PARALLEL=1
          ./scripts/build_all.sh linux_x64 ${{ inputs.shared && '--shared' || '' }}

      - name: Run link tests
        run: |
          python tests/run_tests.py --platform linux_x64 --json-out _out/test_results_linux_x64.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux_x64-artifacts
          path: _out/
          retention-days: 1
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Linux arm64 (native on ARM runner)
  # ---------------------------------------------------------------------------
  build-linux-arm64:
    needs: configure
    if: needs.configure.outputs.linux_arm64 == 'true'
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install build tools
        run: |
          # Remove system libuv so CMake finds ours (ubuntu-24.04 has libuv1 pre-installed)
          sudo apt-get remove -y libuv1-dev libuv1t64 libuv1 2>/dev/null || true
          sudo rm -f /usr/lib/x86_64-linux-gnu/libuv.so* /usr/lib/aarch64-linux-gnu/libuv.so* 2>/dev/null || true
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build ccache \
            libx11-dev libx11-xcb-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libxext-dev libxss-dev libxtst-dev \
            libxkbcommon-dev libasound2-dev libgl1-mesa-dev libvulkan-dev

      - name: Init submodules
        run: |
          git submodule update --init --jobs 4
          # cimgui has a nested imgui submodule that we need
          cd deps/cimgui && git submodule update --init imgui
          cd deps/libdatachannel && git submodule update --init --jobs 4

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-linux_arm64-${{ hashFiles('CMakeLists.txt', 'src/**/*.c', 'src/**/*.h', 'src/**/*.cpp') }}
          restore-keys: |
            ccache-linux_arm64-

      - name: Build linux_arm64
        run: |
          export CMAKE_C_COMPILER_LAUNCHER=ccache
          export CMAKE_CXX_COMPILER_LAUNCHER=ccache
          export MOREDEPS_TOP_LEVEL_PARALLEL=1
          ./scripts/build_all.sh linux_arm64 ${{ inputs.shared && '--shared' || '' }}

      - name: Run link tests
        run: |
          python tests/run_tests.py --platform linux_arm64 --json-out _out/test_results_linux_arm64.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux_arm64-artifacts
          path: _out/
          retention-days: 1
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Emscripten (wasm32)
  # ---------------------------------------------------------------------------
  build-wasm:
    needs: configure
    if: needs.configure.outputs.wasm_emscripten == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install build tools
        run: |
          # Remove system libuv so CMake finds ours (ubuntu-24.04 has libuv1 pre-installed)
          sudo apt-get remove -y libuv1-dev libuv1t64 libuv1 2>/dev/null || true
          sudo rm -f /usr/lib/x86_64-linux-gnu/libuv.so* /usr/lib/aarch64-linux-gnu/libuv.so* 2>/dev/null || true
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build ccache

      - name: Init submodules
        run: |
          git submodule update --init --jobs 4
          # cimgui has a nested imgui submodule that we need
          cd deps/cimgui && git submodule update --init imgui
          cd deps/libdatachannel && git submodule update --init --jobs 4

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-wasm_emscripten-${{ hashFiles('CMakeLists.txt', 'src/**/*.c', 'src/**/*.h', 'src/**/*.cpp') }}
          restore-keys: |
            ccache-wasm_emscripten-

      - name: Cache Emscripten SDK
        uses: actions/cache@v4
        with:
          path: ~/emsdk
          key: emsdk-${{ runner.os }}-${{ env.EMSDK_VERSION }}-${{ hashFiles('toolchain/wasm_emscripten.cmake') }}
          restore-keys: |
            emsdk-${{ runner.os }}-${{ env.EMSDK_VERSION }}-

      - name: Install Emscripten
        run: |
          if [ ! -f "$HOME/emsdk/emsdk" ]; then
            git clone --depth 1 https://github.com/emscripten-core/emsdk.git ~/emsdk
          fi
          ~/emsdk/emsdk install "$EMSDK_VERSION"
          ~/emsdk/emsdk activate "$EMSDK_VERSION"
          ~/emsdk/upstream/emscripten/emcc --version | head -1

      - name: Build wasm_emscripten
        run: |
          source ~/emsdk/emsdk_env.sh
          export CMAKE_C_COMPILER_LAUNCHER=ccache
          export CMAKE_CXX_COMPILER_LAUNCHER=ccache
          export MOREDEPS_TOP_LEVEL_PARALLEL=1
          ./scripts/build_all.sh wasm_emscripten ${{ inputs.shared && '--shared' || '' }}

      - name: Run link tests
        run: |
          source ~/emsdk/emsdk_env.sh
          python tests/run_tests.py --platform wasm_emscripten --json-out _out/test_results_wasm_emscripten.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm_emscripten-artifacts
          path: _out/
          retention-days: 1
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # macOS arm64 (native)
  # ---------------------------------------------------------------------------
  build-macos:
    needs: configure
    if: needs.configure.outputs.macos_arm64 == 'true'
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install build tools
        run: |
          brew install ninja ccache

      - name: Init submodules
        run: |
          git submodule update --init --jobs 4
          # cimgui has a nested imgui submodule that we need
          cd deps/cimgui && git submodule update --init imgui
          cd deps/libdatachannel && git submodule update --init --jobs 4

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-macos-${{ hashFiles('CMakeLists.txt', 'src/**/*.c', 'src/**/*.h', 'src/**/*.cpp') }}
          restore-keys: |
            ccache-macos-

      - name: Build macos_arm64
        run: |
          export CMAKE_C_COMPILER_LAUNCHER=ccache
          export CMAKE_CXX_COMPILER_LAUNCHER=ccache
          export MOREDEPS_TOP_LEVEL_PARALLEL=1
          ./scripts/build_all.sh macos_arm64 ${{ inputs.shared && '--shared' || '' }}

      - name: Run link tests
        run: |
          python tests/run_tests.py --platform macos_arm64 --json-out _out/test_results_macos_arm64.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: _out/
          retention-days: 1
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # iOS (arm64 device + simulator — cross-compiled from macOS)
  # ---------------------------------------------------------------------------
  build-ios:
    needs: configure
    if: needs.configure.outputs.ios == 'true'
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install build tools
        run: |
          brew install ninja ccache

      - name: Init submodules
        run: |
          git submodule update --init --jobs 4
          cd deps/cimgui && git submodule update --init imgui
          cd deps/libdatachannel && git submodule update --init --jobs 4

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-ios-${{ hashFiles('CMakeLists.txt', 'src/**/*.c', 'src/**/*.h', 'src/**/*.cpp') }}
          restore-keys: |
            ccache-ios-

      - name: Build ios_arm64
        run: |
          export CMAKE_C_COMPILER_LAUNCHER=ccache
          export CMAKE_CXX_COMPILER_LAUNCHER=ccache
          export MOREDEPS_TOP_LEVEL_PARALLEL=1
          ./scripts/build_all.sh ios_arm64

      - name: Run link tests ios_arm64
        run: |
          python tests/run_tests.py --platform ios_arm64 --json-out _out/test_results_ios_arm64.json || true

      - name: Build ios_simulator_arm64
        run: |
          export CMAKE_C_COMPILER_LAUNCHER=ccache
          export CMAKE_CXX_COMPILER_LAUNCHER=ccache
          export MOREDEPS_TOP_LEVEL_PARALLEL=1
          ./scripts/build_all.sh ios_simulator_arm64

      - name: Run link tests ios_simulator_arm64
        run: |
          python tests/run_tests.py --platform ios_simulator_arm64 --json-out _out/test_results_ios_simulator_arm64.json || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-artifacts
          path: _out/
          retention-days: 1
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Android arm64 (cross-compiled from Linux ARM runner)
  # ---------------------------------------------------------------------------
  build-android:
    needs: configure
    if: needs.configure.outputs.android == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ninja-build ccache

      - name: Install Android NDK
        run: |
          NDK_VER="r29"
          NDK_ZIP="android-ndk-${NDK_VER}-linux.zip"
          curl -fLO "https://dl.google.com/android/repository/${NDK_ZIP}"
          sudo unzip -q "${NDK_ZIP}" -d /usr/local/share
          rm "${NDK_ZIP}"
          echo "ANDROID_NDK=/usr/local/share/android-ndk-${NDK_VER}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=/usr/local/share/android-ndk-${NDK_VER}" >> "$GITHUB_ENV"
          echo "NDK installed at /usr/local/share/android-ndk-${NDK_VER}"

      - name: Init submodules
        run: |
          git submodule update --init --jobs 4
          cd deps/cimgui && git submodule update --init imgui
          cd deps/libdatachannel && git submodule update --init --jobs 4

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-android_arm64-${{ hashFiles('CMakeLists.txt', 'src/**/*.c', 'src/**/*.h', 'src/**/*.cpp') }}
          restore-keys: |
            ccache-android_arm64-

      - name: Build android_arm64
        run: |
          export CMAKE_C_COMPILER_LAUNCHER=ccache
          export CMAKE_CXX_COMPILER_LAUNCHER=ccache
          export MOREDEPS_TOP_LEVEL_PARALLEL=1
          ./scripts/build_all.sh android_arm64

      - name: Run link tests android_arm64
        run: |
          python tests/run_tests.py --platform android_arm64 --json-out _out/test_results_android_arm64.json || true

      - name: Build android_x64
        run: |
          export CMAKE_C_COMPILER_LAUNCHER=ccache
          export CMAKE_CXX_COMPILER_LAUNCHER=ccache
          export MOREDEPS_TOP_LEVEL_PARALLEL=1
          ./scripts/build_all.sh android_x64

      - name: Run link tests android_x64
        run: |
          python tests/run_tests.py --platform android_x64 --json-out _out/test_results_android_x64.json || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: _out/
          retention-days: 1
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Windows x64 (native)
  # ---------------------------------------------------------------------------
  build-windows-x64:
    needs: configure
    if: needs.configure.outputs.windows_x64 == 'true'
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install build tools
        run: |
          choco install ninja sccache

      - name: Init submodules
        run: |
          git submodule update --init --jobs 4
          # cimgui has a nested imgui submodule that we need
          cd deps/cimgui && git submodule update --init imgui
          cd deps/libdatachannel && git submodule update --init --jobs 4
        shell: bash

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.sccache
          key: sccache-windows_x64-${{ hashFiles('CMakeLists.txt', 'src/**/*.c', 'src/**/*.h', 'src/**/*.cpp') }}
          restore-keys: |
            sccache-windows_x64-

      - name: Build windows_x64
        run: |
          export SCCACHE_DIR="$GITHUB_WORKSPACE/.sccache"
          export PATH="/c/ProgramData/chocolatey/lib/sccache/tools:$PATH"
          export CMAKE_C_COMPILER_LAUNCHER=sccache
          export CMAKE_CXX_COMPILER_LAUNCHER=sccache
          export MOREDEPS_TOP_LEVEL_PARALLEL=1
          ./scripts/build_all.sh windows_x64 ${{ inputs.shared && '--shared' || '' }}
        shell: bash

      - name: Run link tests
        run: |
          source scripts/setup_vcvars.sh x64
          python tests/run_tests.py --platform windows_x64 --json-out _out/test_results_windows_x64.json
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows_x64-artifacts
          path: _out/
          retention-days: 1
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Windows arm64 (native on ARM runner)
  # ---------------------------------------------------------------------------
  build-windows-arm64:
    needs: configure
    if: needs.configure.outputs.windows_arm64 == 'true'
    runs-on: windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install build tools
        run: |
          choco install ninja sccache

      - name: Init submodules
        run: |
          git submodule update --init --jobs 4
          # cimgui has a nested imgui submodule that we need
          cd deps/cimgui && git submodule update --init imgui
          cd deps/libdatachannel && git submodule update --init --jobs 4
        shell: bash

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.sccache
          key: sccache-windows_arm64-${{ hashFiles('CMakeLists.txt', 'src/**/*.c', 'src/**/*.h', 'src/**/*.cpp') }}
          restore-keys: |
            sccache-windows_arm64-

      - name: Build windows_arm64
        run: |
          export SCCACHE_DIR="$GITHUB_WORKSPACE/.sccache"
          export PATH="/c/ProgramData/chocolatey/lib/sccache/tools:$PATH"
          export CMAKE_C_COMPILER_LAUNCHER=sccache
          export CMAKE_CXX_COMPILER_LAUNCHER=sccache
          export MOREDEPS_TOP_LEVEL_PARALLEL=1
          ./scripts/build_all.sh windows_arm64 ${{ inputs.shared && '--shared' || '' }}
        shell: bash

      - name: Run link tests
        run: |
          source scripts/setup_vcvars.sh arm64 || source scripts/setup_vcvars.sh x64_arm64
          python tests/run_tests.py --platform windows_arm64 --json-out _out/test_results_windows_arm64.json
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows_arm64-artifacts
          path: _out/
          retention-days: 1
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Release job: packages artifacts, creates manifest, uploads to GitHub Releases
  # ---------------------------------------------------------------------------
  release:
    needs: [configure, build-linux-x64, build-linux-arm64, build-wasm, build-macos, build-ios, build-android, build-windows-x64, build-windows-arm64]
    runs-on: ubuntu-24.04
    # Only run release if all requested builds succeeded (not failed or cancelled)
    if: |
      always() &&
      (needs.build-linux-x64.result == 'success' || needs.build-linux-x64.result == 'skipped') &&
      (needs.build-linux-arm64.result == 'success' || needs.build-linux-arm64.result == 'skipped') &&
      (needs.build-wasm.result == 'success' || needs.build-wasm.result == 'skipped') &&
      (needs.build-macos.result == 'success' || needs.build-macos.result == 'skipped') &&
      (needs.build-ios.result == 'success' || needs.build-ios.result == 'skipped') &&
      (needs.build-android.result == 'success' || needs.build-android.result == 'skipped') &&
      (needs.build-windows-x64.result == 'success' || needs.build-windows-x64.result == 'skipped') &&
      (needs.build-windows-arm64.result == 'success' || needs.build-windows-arm64.result == 'skipped')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: _out/
          merge-multiple: true

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate manifest and package zips
        run: |
          python scripts/ci_package.py \
            --out-dir _out/ \
            --repo-sha ${{ github.sha }} \
            --manifest-out moredeps.json

      - name: Collect release files
        run: |
          mkdir -p release_assets
          cp moredeps.json release_assets/
          find _out/ -name "moredeps-*.zip" -exec cp {} release_assets/ \;
          ls -la release_assets/

      - name: Create build release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > /tmp/build-notes.md <<'EOF'
          Automated build for commit ${{ github.sha }}.
          Platforms: ${{ inputs.platforms }}
          EOF
          python3 scripts/upload_release_assets.py \
            --repo ${{ github.repository }} \
            --tag build-${{ github.sha }} \
            --target ${{ github.sha }} \
            --title "Build ${{ github.sha }}" \
            --notes-file /tmp/build-notes.md \
            --assets-dir release_assets/

      - name: Prune old builds (keep last 3)
        run: |
          # List all releases, filter build-* tags, keep only the 3 most recent
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases?per_page=100" \
            | jq -r '[.[] | select(.tag_name | startswith("build-"))] | sort_by(.created_at) | reverse | .[3:] | .[] | "\(.id) \(.tag_name)"' \
            | while read release_id tag_name; do
              echo "Deleting old release: $tag_name (id=$release_id)"
              # Delete the release (assets are deleted with it)
              curl -s -X DELETE -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                "https://api.github.com/repos/${{ github.repository }}/releases/$release_id"
              # Delete the associated tag
              curl -s -X DELETE -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                "https://api.github.com/repos/${{ github.repository }}/git/refs/tags/$tag_name"
            done
          echo "Pruning complete."

      - name: Merge with previous latest release
        run: |
          # Download existing latest release assets so we can carry forward
          # zips for platforms that weren't rebuilt in this run.
          mkdir -p prev_assets
          PREV_DATA=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/latest")
          PREV_ID=$(echo "$PREV_DATA" | jq -r '.id // empty')
          if [ -n "$PREV_ID" ] && [ "$PREV_ID" != "null" ]; then
            echo "$PREV_DATA" | jq -r '.assets[] | "\(.id) \(.name) \(.browser_download_url)"' | while read asset_id name url; do
              # Keep zips for platforms not built this run (e.g. if only android was
              # selected, keep the macos/linux/windows/ios zips from the previous run).
              # New zips in release_assets/ take precedence — we skip those names.
              if [ -f "release_assets/$name" ]; then
                echo "Skipping $name (rebuilt in this run)"
              else
                echo "Carrying forward $name from previous latest"
                curl -sfL -o "prev_assets/$name" "$url"
              fi
            done
            # Move carried-forward assets into release_assets/
            cp prev_assets/* release_assets/ 2>/dev/null || true
          fi

      - name: Update latest release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > /tmp/latest-notes.md <<'EOF'
          Rolling alias for the latest successful build.
          Current: ${{ github.sha }}
          EOF
          python3 scripts/upload_release_assets.py \
            --repo ${{ github.repository }} \
            --tag latest \
            --target ${{ github.sha }} \
            --title "Latest Build" \
            --notes-file /tmp/latest-notes.md \
            --assets-dir release_assets/ \
            --sleep 1.0

  # ---------------------------------------------------------------------------
  # Redeploy the Pages site with the fresh moredeps.json.
  # The site fetches the manifest same-origin; release asset URLs cannot be
  # fetched from the browser (github.com redirects to
  # release-assets.githubusercontent.com without CORS headers).
  # ---------------------------------------------------------------------------
  deploy-site:
    needs: release
    if: needs.release.result == 'success'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: "pages"
      cancel-in-progress: false
    steps:
      - name: Checkout docs only
        uses: actions/checkout@v4
        with:
          sparse-checkout: docs/
          sparse-checkout-cone-mode: false
          submodules: false

      - name: Fetch latest moredeps.json
        run: |
          curl -sfL "https://github.com/${{ github.repository }}/releases/download/latest/moredeps.json" \
            -o docs/moredeps.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
